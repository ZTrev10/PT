<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff5ec">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PT Done">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>PT Done</title>
  <style>
    :root {
      --bg: #fff5ec;
      --ink: #2a1708;
      --muted: #7d5f45;
      --line: #f1c79d;
      --panel: #ffffff;
      --panel-soft: #fff0dd;
      --green: #1f9d62;
      --green-dark: #117044;
      --green-soft: #dff5e8;
      --blue: #1667b7;
      --blue-soft: #e3f0ff;
      --orange: #f47b20;
      --orange-dark: #9a4308;
      --danger: #b42318;
      --shadow: 0 6px 14px rgba(118, 61, 11, 0.08);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); min-height: 100vh; padding: env(safe-area-inset-top) 0 calc(14px + env(safe-area-inset-bottom)); user-select: none; -webkit-user-select: none; }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .app { width: min(100%, 720px); margin: 0 auto; padding: 8px 8px 20px; }
    .top { position: sticky; top: 0; z-index: 5; background: rgba(255, 245, 236, 0.94); backdrop-filter: blur(14px); margin: -8px -8px 6px; padding: 5px 8px 6px; border-bottom: 1px solid rgba(241, 199, 157, 0.8); }
    .title-row { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-bottom: 4px; }
    .icon-button { width: 38px; height: 28px; border-radius: 999px; background: var(--orange); color: white; box-shadow: none; font-size: 16px; font-weight: 900; }
    .progress-wrap { display: grid; grid-template-columns: 1fr auto; gap: 5px; align-items: center; }
    .progress-track { height: 4px; background: #f3d5b8; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #35bf76, #117044); border-radius: inherit; transition: width 220ms ease; }
    .progress-label { color: var(--green-dark); font-size: 11px; font-weight: 900; min-width: 38px; text-align: right; }
    .top-chips { display: flex; gap: 4px; overflow-x: auto; margin-top: 5px; scrollbar-width: none; }
    .top-chips::-webkit-scrollbar { display: none; }
    .day-switch, .actions { display: flex; gap: 4px; flex: 0 0 auto; }
    .day-btn, .small-btn { min-height: 28px; border-radius: 999px; padding: 0 10px; background: var(--panel); color: var(--muted); box-shadow: inset 0 0 0 1px var(--line); font-weight: 900; font-size: 12px; white-space: nowrap; }
    .day-btn.active { background: var(--orange); color: white; box-shadow: none; }
    .small-btn.green { background: var(--green-soft); color: var(--green-dark); box-shadow: none; }
    .section { margin: 10px 0 14px; }
    .section-head { display: flex; align-items: end; justify-content: space-between; gap: 8px; margin: 0 2px 5px; }
    h2 { margin: 0; font-size: 15px; letter-spacing: -0.01em; }
    .section-count { color: var(--muted); font-size: 11px; font-weight: 900; white-space: nowrap; }
    .exercise { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow); padding: 6px; margin-bottom: 6px; transition: background 180ms ease, border-color 180ms ease, opacity 180ms ease; cursor: pointer; }
    .exercise.done { background: var(--green-soft); border-color: #9addb7; }
    .exercise.done .exercise-name, .exercise.done .detail, .exercise.done .set-copy, .exercise.done .status-copy { color: var(--green-dark); }
    .exercise-row { display: grid; grid-template-columns: minmax(0, 1fr) minmax(76px, 0.72fr) 72px; gap: 8px; align-items: stretch; }
    .exercise-copy { min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 2px; }
    .exercise-title-wrap { min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 2px; }
    .exercise-name { margin: 0; font-size: 14px; font-weight: 950; line-height: 1.08; text-align: left; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .detail { margin: 0; color: var(--muted); font-size: 11px; font-weight: 800; line-height: 1.15; text-align: right; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .set-copy, .status-copy { color: var(--orange-dark); font-size: 11px; font-weight: 950; line-height: 1.12; text-align: right; white-space: nowrap; }
    .status-copy { display: flex; align-items: center; justify-content: flex-end; }
    .card-actions { display: grid; grid-template-columns: 1fr; gap: 4px; margin-top: 0; }
    .main-tap { min-height: 46px; border-radius: 12px; background: var(--orange); color: white; font-size: 14px; font-weight: 950; letter-spacing: -0.01em; padding: 0 6px; }
    .main-tap.done { background: var(--green); }
    .main-tap.resetting { background: var(--danger); }
    .main-tap.timer-idle { background: var(--blue); }
    .main-tap.timer-running { background: var(--blue); color: white; }
    .main-tap.timer-paused { background: var(--blue-soft); color: var(--blue); box-shadow: inset 0 0 0 1px #9cc9f7; }
    .delete-btn { min-height: 34px; border-radius: 12px; background: #fff1f0; color: var(--danger); font-weight: 900; display: none; margin-top: 0; }
    .editing .delete-btn { display: block; }
    .meta-chips { display: none; }
    .chip { background: var(--panel-soft); color: var(--orange-dark); border-radius: 999px; padding: 3px 7px; font-size: 10px; font-weight: 900; }
    .exercise-edit { display: none; border-top: 1px solid var(--line); margin-top: 8px; padding-top: 8px; }
    .editing .exercise-edit { display: grid; gap: 7px; }
    .editing .exercise-row { grid-template-columns: 1fr; }
    .editing .exercise-name, .editing .detail { display: block; overflow: visible; text-align: left; }
    .edit-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .secondary-btn { min-height: 34px; border-radius: 12px; background: var(--panel-soft); color: var(--ink); font-weight: 900; }
    .edit-panel { display: none; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); padding: 9px; margin: 8px 0 12px; }
    .editing .edit-panel { display: block; }
    .field-grid { display: grid; gap: 7px; }
    .field-grid.two { grid-template-columns: 1fr 1fr; }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 900; }
    input, select, textarea { width: 100%; border: 1px solid var(--line); border-radius: 12px; background: #fffaf5; color: var(--ink); padding: 9px; font-size: 15px; outline: none; }
    textarea { min-height: 58px; resize: vertical; user-select: text; -webkit-user-select: text; }
    input { user-select: text; -webkit-user-select: text; }
    .empty { background: var(--panel-soft); border: 1px dashed #dca56e; color: var(--muted); border-radius: 12px; padding: 12px; font-weight: 800; }
    .celebration { position: fixed; inset: 0; z-index: 20; display: none; place-items: center; background: rgba(255, 245, 236, 0.94); padding: 20px; text-align: center; }
    .celebration.show { display: grid; }
    .celebration-card { background: var(--green); color: white; width: min(100%, 460px); border-radius: 28px; padding: 34px 22px; box-shadow: 0 20px 60px rgba(17, 112, 68, 0.28); }
    .celebration-card h3 { margin: 0 0 8px; font-size: clamp(42px, 14vw, 72px); line-height: 0.9; letter-spacing: -0.04em; }
    .celebration-card p { margin: 0 0 18px; font-size: 18px; font-weight: 750; }
    .celebration-card button { min-height: 58px; padding: 0 22px; border-radius: 18px; background: white; color: var(--green-dark); font-size: 18px; font-weight: 900; }
    @media (min-width: 680px) { .exercise-list { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; } .exercise { margin-bottom: 0; } }
  </style>
</head>
<body>
  <main class="app" id="app">
    <header class="top">
      <div class="title-row">
        <button class="icon-button" id="editToggle" type="button" aria-label="Edit exercises">+</button>
      </div>
      <div class="progress-wrap" aria-label="Today's progress">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel">0/0</div>
      </div>
      <div class="top-chips">
        <div class="day-switch" role="group" aria-label="Choose today's alternating routine">
          <button class="day-btn" type="button" data-day="lower">Lower + Balance</button>
          <button class="day-btn" type="button" data-day="upper">Upper + Core</button>
        </div>
        <div class="actions">
          <button class="small-btn" type="button" id="resetToday">Reset</button>
          <button class="small-btn green" type="button" id="showAll">All Clear</button>
        </div>
      </div>
    </header>

    <section class="edit-panel" aria-label="Add exercise">
      <div class="field-grid">
        <label>
          Section
          <select id="newSection"></select>
        </label>
        <label>
          Exercise name
          <input id="newName" type="text" placeholder="Example: Step-ups">
        </label>
        <div class="field-grid two">
          <label>
            Reps
            <input id="newReps" type="number" min="0" max="999" value="10">
          </label>
          <label>
            Weight / band
            <input id="newWeight" type="text" placeholder="20lbs or black band">
          </label>
        </div>
        <label>
          Notes
          <textarea id="newDetails" placeholder="Example: thumbs back, hold 3s, right then left"></textarea>
        </label>
        <div class="field-grid two">
          <label>
            Sets
            <input id="newSets" type="number" min="1" max="9" value="2">
          </label>
          <label>
            Timer seconds
            <input id="newTimer" type="number" min="0" step="5" value="0">
          </label>
        </div>
        <button class="main-tap" type="button" id="addExercise">Add Exercise</button>
      </div>
    </section>

    <div id="sections"></div>
  </main>

  <div class="celebration" id="celebration" role="dialog" aria-modal="true" aria-labelledby="clearTitle">
    <div class="celebration-card">
      <h3 id="clearTitle">All Clear</h3>
      <p>Today's PT is complete.</p>
      <button type="button" id="closeCelebration">Back to list</button>
    </div>
  </div>

  <script>
    const STORE = "pt-done-v1";
    const PROGRESS_STORE = "pt-done-progress-v1";
    const DAY_STORE = "pt-done-day-v1";
    const SESSION_STORE = "pt-done-session-v1";

    const sections = [
      { id: "vor", title: "Vestibulo-Ocular Reflex", cadence: "daily" },
      { id: "lower", title: "Lower Body", cadence: "lower" },
      { id: "balance", title: "Balance", cadence: "lower" },
      { id: "upper", title: "Upper Body", cadence: "upper" },
      { id: "core", title: "Core", cadence: "upper" }
    ];

    const defaultExercises = [
      { id: "vor-thumb-head", section: "vor", name: "Thumb Up, Head Side-to-Side", reps: 10, sets: 3 },
      { id: "vor-march-opposite", section: "vor", name: "March Head and Thumb, Opposite Movement", reps: 10, sets: 3 },
      { id: "vor-walk-forward-t", section: "vor", name: "Walk Forward, Hold T, Follow with Head", reps: 10, sets: 3 },
      { id: "vor-walk-back-t", section: "vor", name: "Walk Backward, Hold T, Head Side-to-Side", reps: 10, sets: 3 },
      { id: "vor-ball-toss", section: "vor", name: "Walking Ball Toss", reps: 10, sets: 3 },
      { id: "vor-heart-toss", section: "vor", name: "Heart Toss", details: "Timer: 2 min", sets: 1, timer: 120 },

      { id: "lower-side-step", section: "lower", name: "Side Step", reps: 20, weight: "20lbs", sets: 2 },
      { id: "lower-chair-sits", section: "lower", name: "Chair Sits", reps: 15, weight: "20lbs", sets: 2 },
      { id: "lower-ankle-raises", section: "lower", name: "Ankle Raises", reps: 15, weight: "20lbs", sets: 2 },
      { id: "lower-lunge", section: "lower", name: "Lunge", reps: 15, weight: "20lbs", sets: 2 },
      { id: "lower-hip-right", section: "lower", name: "Standing Hip Abduction, Right Foot", reps: 10, weight: "black band", details: "12, 1:30, 4:30, 6", sets: 2 },
      { id: "lower-hip-left", section: "lower", name: "Standing Hip Abduction, Left Foot", reps: 10, weight: "black band", details: "12, 10:30, 7:30, 6", sets: 2 },
      { id: "lower-rdl", section: "lower", name: "RDL", reps: 15, weight: "25lbs", sets: 2 },

      { id: "core-dead-bug", section: "core", name: "Dead Bug", reps: 10, details: "Hold 3s", sets: 2 },
      { id: "core-pallof", section: "core", name: "Pallof Press", reps: 10, weight: "light band", details: "2s", sets: 2 },
      { id: "core-bird-dog", section: "core", name: "Bird Dog", reps: 10, details: "Hold 3s", sets: 2 },

      { id: "balance-left-left-right", section: "balance", name: "Left Leg Stand Eyes Left and Right", sets: 1, timer: 30 },
      { id: "balance-left-up-down", section: "balance", name: "Left Leg Stand Eyes Up and Down", sets: 1, timer: 30 },
      { id: "balance-left-closed", section: "balance", name: "Left Leg Stand Eyes Closed", sets: 1, timer: 60 },
      { id: "balance-right-left-right", section: "balance", name: "Right Leg Stand Eyes Left and Right", sets: 1, timer: 30 },
      { id: "balance-right-up-down", section: "balance", name: "Right Leg Stand Eyes Up and Down", sets: 1, timer: 30 },
      { id: "balance-right-closed", section: "balance", name: "Right Leg Stand Eyes Closed", sets: 1, timer: 60 },

      { id: "upper-face-pull", section: "upper", name: "Face Pull", reps: 15, weight: "medium band", details: "Thumbs back", sets: 2 },
      { id: "upper-row", section: "upper", name: "Bent-Over Row", reps: 10, weight: "15lbs", sets: 2 },
      { id: "upper-push-up", section: "upper", name: "Push-Up", reps: 15, sets: 2 },
      { id: "upper-curl", section: "upper", name: "Curl", reps: 10, weight: "15lbs", sets: 2 },
      { id: "upper-overhead", section: "upper", name: "Overhead Press", reps: 10, weight: "15lbs", sets: 2 },
      { id: "upper-farmers", section: "upper", name: "Farmer's Carry", weight: "25lbs", details: "Timer: 1 min", sets: 2, timer: 60 }
    ];

    let exercises = loadExercises();
    let progress = loadJson(PROGRESS_STORE, {});
    let dayChoice = loadDayChoice();
    let editMode = false;
    let timer = null;

    const app = document.getElementById("app");
    const sectionsNode = document.getElementById("sections");
    const progressFill = document.getElementById("progressFill");
    const progressLabel = document.getElementById("progressLabel");
    const celebration = document.getElementById("celebration");

    function pacificDateParts(date = new Date()) {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "America/Los_Angeles",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(date).reduce((acc, part) => {
        acc[part.type] = part.value;
        return acc;
      }, {});
      return { year: parts.year, month: parts.month, day: parts.day };
    }

    function todayKey() {
      const parts = pacificDateParts();
      return parts.year + "-" + parts.month + "-" + parts.day;
    }

    function oppositeDay(day) {
      return day === "lower" ? "upper" : "lower";
    }

    function loadJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key)) || fallback;
      } catch {
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function normalizeExercise(exercise) {
      const next = { ...exercise };
      const details = String(next.details || "");
      if (!next.reps) {
        const reps = details.match(/\bx\s*(\d+)/i);
        if (reps) next.reps = Number(reps[1]);
      }
      if (!next.weight) {
        const weight = details.match(/\bw\/\s*([^,·]+)/i);
        if (weight) next.weight = weight[1].trim();
      }
      next.sets = Math.max(1, Number(next.sets) || 1);
      if (next.timer) next.timer = Math.max(0, Number(next.timer) || 0);
      return next;
    }

    function loadExercises() {
      const saved = loadJson(STORE, null);
      const list = Array.isArray(saved) && saved.length ? saved : defaultExercises;
      const hasOldBalance = list.some((item) => ["balance-left-right", "balance-up-down", "balance-closed"].includes(item.id));
      const normalized = hasOldBalance
        ? [...list.filter((item) => item.section !== "balance"), ...defaultExercises.filter((item) => item.section === "balance")]
        : list;
      return normalized.map(normalizeExercise);
    }

    function loadDayChoice() {
      const saved = loadJson(DAY_STORE, {});
      const key = todayKey();
      if (saved[key]) return saved[key];
      const session = loadJson(SESSION_STORE, null);
      if (session?.day && session?.date !== key) return oppositeDay(session.day);
      return "lower";
    }

    function saveDayChoice(choice) {
      const saved = loadJson(DAY_STORE, {});
      saved[todayKey()] = choice;
      saveJson(DAY_STORE, saved);
    }

    function todaysProgress() {
      const key = todayKey();
      if (!progress[key]) progress[key] = {};
      return progress[key];
    }

    function activeSections() {
      return sections.filter((section) => section.cadence === "daily" || section.cadence === dayChoice);
    }

    function activeExercises() {
      const active = new Set(activeSections().map((section) => section.id));
      return exercises.filter((exercise) => active.has(exercise.section));
    }

    function remainingSets(exercise) {
      const done = todaysProgress()[exercise.id] || 0;
      return Math.max(0, (exercise.sets || 1) - done);
    }

    function isDone(exercise) {
      return remainingSets(exercise) === 0;
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return mins + ":" + String(secs).padStart(2, "0");
    }

    function timerState(id) {
      if (!timer || timer.id !== id) return null;
      return timer;
    }

    function runTimerTick() {
      if (!timer) return;
      timer.remaining -= 1;
      if (timer.remaining <= 0) {
        const exercise = exercises.find((item) => item.id === timer.id);
        clearInterval(timer.interval);
        timer.remaining = 0;
        timer.running = false;
        timer = null;
        if (navigator.vibrate) navigator.vibrate([150, 80, 150]);
        if (exercise) completeSet(exercise, { keepTimer: true });
        else render();
        return;
      }
      render();
    }

    function startTimer(exercise) {
      if (timer?.interval) clearInterval(timer.interval);
      timer = { id: exercise.id, remaining: exercise.timer, interval: null, running: true };
      timer.interval = setInterval(runTimerTick, 1000);
      render();
    }

    function pauseTimer() {
      if (!timer) return;
      clearInterval(timer.interval);
      timer.running = false;
      render();
    }

    function resumeTimer() {
      if (!timer) return;
      timer.running = true;
      timer.interval = setInterval(runTimerTick, 1000);
      render();
    }

    function toggleTimer(exercise) {
      const state = timerState(exercise.id);
      if (!state) startTimer(exercise);
      else if (state.running) pauseTimer();
      else resumeTimer();
    }

    function resetTimer(id) {
      if (timer?.id === id && timer.interval) clearInterval(timer.interval);
      if (timer?.id === id) timer = null;
      render();
    }

    function completeSet(exercise, options = {}) {
      const today = todaysProgress();
      const current = today[exercise.id] || 0;
      today[exercise.id] = Math.min(exercise.sets || 1, current + 1);
      if (!options.keepTimer && timer?.id === exercise.id) resetTimer(exercise.id);
      saveJson(PROGRESS_STORE, progress);
      render();
      maybeCelebrate();
    }

    function resetExercise(exercise) {
      const today = todaysProgress();
      today[exercise.id] = 0;
      if (timer?.id === exercise.id) resetTimer(exercise.id);
      saveJson(PROGRESS_STORE, progress);
      render();
    }

    function undoSet(exercise) {
      resetExercise(exercise);
    }

    function saveCompletedSession() {
      saveJson(SESSION_STORE, { date: todayKey(), day: dayChoice });
    }

    function maybeCelebrate(force = false) {
      const list = activeExercises();
      const allDone = list.length > 0 && list.every(isDone);
      if (force || allDone) {
        if (allDone) saveCompletedSession();
        celebration.classList.add("show");
      }
    }

    function renderProgress() {
      const list = activeExercises();
      const total = list.reduce((sum, exercise) => sum + (exercise.sets || 1), 0);
      const done = list.reduce((sum, exercise) => sum + Math.min(todaysProgress()[exercise.id] || 0, exercise.sets || 1), 0);
      const pct = total ? Math.round((done / total) * 100) : 0;
      progressFill.style.width = pct + "%";
      progressLabel.textContent = done + "/" + total;
    }

    function renderDayButtons() {
      document.querySelectorAll(".day-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.day === dayChoice);
      });
    }

    function renderSectionSelect() {
      const select = document.getElementById("newSection");
      select.innerHTML = sections.map((section) => `<option value="${section.id}">${section.title}</option>`).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function displayDetails(exercise) {
      const parts = [];
      if (exercise.reps) parts.push("x " + exercise.reps);
      if (exercise.weight) parts.push("w/ " + exercise.weight);
      if (exercise.details) parts.push(exercise.details);
      if (exercise.timer && !parts.some((part) => part.toLowerCase().includes("timer"))) {
        parts.push("Timer: " + formatTime(exercise.timer));
      }
      return parts.join(" · ");
    }

    function renderEditFields(exercise) {
      return `
        <div class="exercise-edit">
          <label>
            Exercise name
            <input data-action="edit-field" data-field="name" data-id="${exercise.id}" type="text" value="${escapeHtml(exercise.name)}">
          </label>
          <label>
            Section
            <select data-action="edit-field" data-field="section" data-id="${exercise.id}">
              ${sections.map((section) => `<option value="${section.id}" ${section.id === exercise.section ? "selected" : ""}>${section.title}</option>`).join("")}
            </select>
          </label>
          <div class="field-grid two">
            <label>
              Reps
              <input data-action="edit-field" data-field="reps" data-kind="number" data-id="${exercise.id}" type="number" min="0" max="999" value="${exercise.reps || ""}">
            </label>
            <label>
              Weight / band
              <input data-action="edit-field" data-field="weight" data-id="${exercise.id}" type="text" value="${escapeHtml(exercise.weight || "")}" placeholder="20lbs or black band">
            </label>
          </div>
          <div class="field-grid two">
            <label>
              Sets
              <input data-action="edit-field" data-field="sets" data-kind="number" data-id="${exercise.id}" type="number" min="1" max="9" value="${exercise.sets || 1}">
            </label>
            <label>
              Timer seconds
              <input data-action="edit-field" data-field="timer" data-kind="number" data-id="${exercise.id}" type="number" min="0" step="5" value="${exercise.timer || 0}">
            </label>
          </div>
          <label>
            Notes
            <textarea data-action="edit-field" data-field="details" data-id="${exercise.id}" placeholder="Hold 3s, thumbs back, right then left">${escapeHtml(exercise.details || "")}</textarea>
          </label>
          <div class="edit-actions">
            <button class="secondary-btn" type="button" data-action="copy" data-id="${exercise.id}">Duplicate</button>
            <button class="delete-btn" type="button" data-action="delete" data-id="${exercise.id}">Remove</button>
          </div>
        </div>
      `;
    }

    function renderExercise(exercise) {
      const remaining = remainingSets(exercise);
      const done = isDone(exercise);
      const state = timerState(exercise.id);
      const mainLabel = done ? "Completed" : remaining === 1 ? "Finish Exercise" : "Done Set " + ((exercise.sets || 1) - remaining + 1);
      const isTimed = Boolean(exercise.timer);
      const timerClass = isTimed && state?.running ? "timer-running" : isTimed && state ? "timer-paused" : isTimed ? "timer-idle" : "";
      const action = isTimed ? "timer-toggle" : "complete";
      const buttonLabel = done ? "Done" : isTimed ? (state ? formatTime(state.remaining) : "Start") : mainLabel.replace("Done ", "");
      const statusText = done ? "All done" : remaining + " set" + (remaining === 1 ? "" : "s") + " left";

      return `
        <article class="exercise ${done ? "done" : ""}" data-id="${exercise.id}" data-card-action="${action}">
          <div class="exercise-row">
            <div class="exercise-title-wrap">
              <h3 class="exercise-name">${escapeHtml(exercise.name)}</h3>
            </div>
            <div class="exercise-copy">
              <p class="detail">${escapeHtml(displayDetails(exercise))}</p>
              <div class="status-copy">${statusText}</div>
            </div>
            <button class="main-tap ${done ? "done" : ""} ${timerClass}" type="button" data-action="${action}" data-id="${exercise.id}">
              ${buttonLabel}
            </button>
          </div>
          ${renderEditFields(exercise)}
        </article>
      `;
    }

    function renderSections() {
      const activeIds = new Set(activeSections().map((section) => section.id));
      sectionsNode.innerHTML = sections
        .filter((section) => activeIds.has(section.id))
        .map((section) => {
          const list = exercises.filter((exercise) => exercise.section === section.id);
          const done = list.filter(isDone).length;
          return `
            <section class="section">
              <div class="section-head">
                <h2>${section.title}</h2>
                <div class="section-count">${done}/${list.length}</div>
              </div>
              <div class="exercise-list">
                ${list.length ? list.map(renderExercise).join("") : `<div class="empty">No exercises in this section yet.</div>`}
              </div>
            </section>
          `;
        })
        .join("");
    }

    function render() {
      app.classList.toggle("editing", editMode);
      document.getElementById("editToggle").textContent = editMode ? "OK" : "+";
      renderDayButtons();
      renderProgress();
      renderSections();
    }

    document.querySelectorAll(".day-btn").forEach((button) => {
      button.addEventListener("click", () => {
        dayChoice = button.dataset.day;
        saveDayChoice(dayChoice);
        render();
      });
    });

    document.getElementById("editToggle").addEventListener("click", () => {
      editMode = !editMode;
      render();
    });

    document.getElementById("resetToday").addEventListener("click", () => {
      if (timer?.interval) clearInterval(timer.interval);
      timer = null;
      progress[todayKey()] = {};
      saveJson(PROGRESS_STORE, progress);
      celebration.classList.remove("show");
      render();
    });

    document.getElementById("showAll").addEventListener("click", () => maybeCelebrate(true));
    document.getElementById("closeCelebration").addEventListener("click", () => celebration.classList.remove("show"));

    document.getElementById("addExercise").addEventListener("click", () => {
      const name = document.getElementById("newName").value.trim();
      if (!name) return;
      const item = {
        id: "custom-" + Date.now(),
        section: document.getElementById("newSection").value,
        name,
        reps: Math.max(0, Number(document.getElementById("newReps").value) || 0),
        weight: document.getElementById("newWeight").value.trim(),
        details: document.getElementById("newDetails").value.trim(),
        sets: Math.max(1, Number(document.getElementById("newSets").value) || 1),
        timer: Math.max(0, Number(document.getElementById("newTimer").value) || 0)
      };
      if (!item.reps) delete item.reps;
      if (!item.weight) delete item.weight;
      if (!item.timer) delete item.timer;
      exercises.push(item);
      saveJson(STORE, exercises);
      document.getElementById("newName").value = "";
      document.getElementById("newReps").value = "10";
      document.getElementById("newWeight").value = "";
      document.getElementById("newDetails").value = "";
      document.getElementById("newSets").value = "2";
      document.getElementById("newTimer").value = "0";
      render();
    });

    let longPressTimer = null;
    let longPressTriggered = false;

    function cardActionTarget(event) {
      if (event.target.closest(".exercise-edit, input, textarea, select, .secondary-btn, .delete-btn")) return null;
      const button = event.target.closest("button[data-action='complete'], button[data-action='timer-toggle']");
      if (button) return button;
      const card = event.target.closest("article.exercise[data-card-action]");
      if (!card) return null;
      return card.querySelector("button.main-tap[data-action]");
    }

    sectionsNode.addEventListener("pointerdown", (event) => {
      const button = cardActionTarget(event);
      if (!button) return;
      const exercise = exercises.find((item) => item.id === button.dataset.id);
      if (!exercise) return;
      longPressTriggered = false;
      longPressTimer = setTimeout(() => {
        longPressTriggered = true;
        button.classList.add("resetting");
        if (exercise.timer) resetTimer(exercise.id);
        resetExercise(exercise);
        if (navigator.vibrate) navigator.vibrate(80);
      }, 650);
    });

    ["pointerup", "pointercancel", "pointerleave"].forEach((type) => {
      sectionsNode.addEventListener(type, (event) => {
        if (longPressTimer) clearTimeout(longPressTimer);
        longPressTimer = null;
        const button = cardActionTarget(event);
        if (button) button.classList.remove("resetting");
      });
    });

    sectionsNode.addEventListener("click", (event) => {
      const button = cardActionTarget(event);
      if (!button) return;
      const exercise = exercises.find((item) => item.id === button.dataset.id);
      if (!exercise) return;
      const action = button.dataset.action;

      if (action === "complete") {
        if (longPressTriggered) {
          longPressTriggered = false;
          return;
        }
        completeSet(exercise);
      }
      if (action === "timer-toggle") {
        if (longPressTriggered) {
          longPressTriggered = false;
          return;
        }
        if (!isDone(exercise)) toggleTimer(exercise);
      }
      if (action === "undo") undoSet(exercise);
      if (action === "copy") {
        exercises.push({
          ...exercise,
          id: "custom-" + Date.now(),
          name: exercise.name + " Copy"
        });
        saveJson(STORE, exercises);
        render();
      }
      if (action === "delete") {
        exercises = exercises.filter((item) => item.id !== exercise.id);
        saveJson(STORE, exercises);
        render();
      }
    });

    sectionsNode.addEventListener("change", (event) => {
      const input = event.target.closest("[data-action='edit-field']");
      if (!input) return;
      const exercise = exercises.find((item) => item.id === input.dataset.id);
      if (!exercise) return;
      const field = input.dataset.field;
      const raw = input.value.trim();
      if (input.dataset.kind === "number") {
        const number = Math.max(field === "sets" ? 1 : 0, Number(raw) || 0);
        if (number) exercise[field] = number;
        else delete exercise[field];
      } else if (raw) {
        exercise[field] = raw;
      } else {
        delete exercise[field];
      }
      if (field === "timer" && timer?.id === exercise.id) resetTimer(exercise.id);
      saveJson(STORE, exercises);
      render();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    renderSectionSelect();
    render();
  </script>
</body>
</html>
